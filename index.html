              <label>🔵 ${esc(nameA)} 平台</label>
              <select class="rd-select" id="rdSelA" onchange="updateRdComparison()" ${platsA.length===0?'disabled':''}>${selOptsA}</select>
            </div>
            <div>
              <label>🟢 ${esc(nameB)} 平台</label>
              <select class="rd-select" id="rdSelB" onchange="updateRdComparison()" ${platsB.length===0?'disabled':''}>${selOptsB}</select>
            </div>
          </div>
          <div id="rdTableContainer" class="rd-table-wrap"></div>
        </div>
      </div>`;

    const el = document.getElementById('results');
    el.innerHTML = html;
    el.classList.remove('hidden');

    const selB = document.getElementById('rdSelB');
    if (selB && platsB.length > 0) selB.value = initBVal;
    if (platsA.length > 0 && platsB.length > 0) updateRdComparison();
  }

  window.switchRdView = function(mode) {
    const { data1, data2, nameA, nameB, platsA, platsB } = window._rdState || {};
    const content = document.getElementById('rdMainContent');
    if (!content) return;

    // Update tab buttons
    document.querySelectorAll('.rd-tab-btn').forEach(b => b.classList.remove('active'));
    const activeMap = { compare: 'rdTabCompare', rawA: 'rdTabRawA', rawB: 'rdTabRawB' };
    const activeBtn = document.getElementById(activeMap[mode]);
    if (activeBtn) activeBtn.classList.add('active');

    if (mode === 'rawA') {
      content.innerHTML = renderRdRawTable(data1, nameA);
    } else if (mode === 'rawB') {
      content.innerHTML = renderRdRawTable(data2, nameB);
    } else {
      const selOptsA = (platsA||[]).map((p, i) => `<option value="${i}">${esc(p.name)}</option>`).join('');
      const selOptsB = (platsB||[]).map((p, i) => `<option value="${i}">${esc(p.name)}</option>`).join('');
      content.innerHTML = `
        <div class="rd-selector">
          <div><label>🔵 ${esc(nameA)} 平台</label>
            <select class="rd-select" id="rdSelA" onchange="updateRdComparison()">${selOptsA}</select></div>
          <div><label>🟢 ${esc(nameB)} 平台</label>
            <select class="rd-select" id="rdSelB" onchange="updateRdComparison()">${selOptsB}</select></div>
        </div>
        <div id="rdTableContainer" class="rd-table-wrap"></div>`;
      updateRdComparison();
    }
  };

  window.updateRdComparison = function() {
    const { platsA, platsB, nameA, nameB } = window._rdState || {};
    if (!platsA || !platsB) return;
    const idxA = parseInt(document.getElementById('rdSelA')?.value ?? 0);
    const idxB = parseInt(document.getElementById('rdSelB')?.value ?? 0);
    const platA = platsA[idxA];
    const platB = platsB[idxB];
    if (!platA || !platB) return;

    const FIELDS = [
      { key: 'headCounts', label: 'Head Counts' },
      { key: 'senior',     label: 'Senior HC' },
      { key: 'seniorCost', label: 'Senior Unit Cost' },
      { key: 'junior',     label: 'Junior HC' },
      { key: 'juniorCost', label: 'Junior Unit Cost' },
      { key: 'dedication', label: 'Dedication%' },
      { key: 'timeLen',    label: 'Time (months)' },
      { key: 'totalCost',  label: 'Total Cost' },
    ];

    const normJob = s => String(s ?? '').trim().toLowerCase();
    const mapA = new Map(platA.rows.map(r => [normJob(r.jobFunc), r]));
    const mapB = new Map(platB.rows.map(r => [normJob(r.jobFunc), r]));
    const allJobs = [...new Map([...platA.rows, ...platB.rows].map(r => [normJob(r.jobFunc), r.jobFunc])).entries()];

    const fmtV = v => (v === null || v === undefined) ? '—' : (typeof v === 'number' ? v.toLocaleString() : String(v));

    let tbody = '';
    let diffCount = 0;
    for (const [nj, label] of allJobs) {
      const ra = mapA.get(nj);
      const rb = mapB.get(nj);
      const rowCls = !ra ? 'rd-only-b' : !rb ? 'rd-only-a' : '';
      let hasDiff = !ra || !rb;
      const cells = [`<td>${esc(label)}</td>`];
      for (const { key } of FIELDS) {
        const va = ra?.[key] ?? null;
        const vb = rb?.[key] ?? null;
        const diff = va !== vb && !(va === null && vb === null);
        if (diff) hasDiff = true;
        cells.push(`<td class="${diff && ra && rb ? 'rd-cell-diff-a' : ''}">${esc(fmtV(va))}</td>`);
        cells.push(`<td class="${diff && ra && rb ? 'rd-cell-diff-b' : ''}">${esc(fmtV(vb))}</td>`);
      }
      if (hasDiff) diffCount++;
      tbody += `<tr class="${rowCls || (hasDiff ? 'rd-row-diff' : '')}">${cells.join('')}</tr>`;
    }

    const tDiff = platA.totalAmt !== platB.totalAmt && !(platA.totalAmt === null && platB.totalAmt === null);
    const totalCells = [`<td><strong>Total Amount</strong></td>`];
    for (const { key } of FIELDS) {
      if (key !== 'totalCost') {
        totalCells.push('<td></td><td></td>');
      } else {
        totalCells.push(`<td class="${tDiff ? 'rd-cell-diff-a' : ''}">${esc(fmtV(platA.totalAmt))}</td>`);
        totalCells.push(`<td class="${tDiff ? 'rd-cell-diff-b' : ''}">${esc(fmtV(platB.totalAmt))}</td>`);
      }
    }
    tbody += `<tr class="rd-total-row">${totalCells.join('')}</tr>`;

    const subHdrs = FIELDS.map(() =>
      `<th class="rd-th-a">${esc(nameA)}</th><th class="rd-th-b">${esc(nameB)}</th>`
    ).join('');
    const mainHdrs = FIELDS.map(f => `<th colspan="2">${esc(f.label)}</th>`).join('');

    const totalDiffTxt = tDiff
      ? ` ／ Total Cost 差異：${esc(fmtV(platA.totalAmt))} vs ${esc(fmtV(platB.totalAmt))}`
      : ' ／ Total Cost 一致';
    const summary = `<div style="padding:10px 20px 16px;font-size:.8rem;color:#94a3b8;">
      差異行：<span style="color:#fbbf24;font-weight:700;">${diffCount}</span> 行${totalDiffTxt}
    </div>`;

    document.getElementById('rdTableContainer').innerHTML = `
      <table class="rd-table">
        <thead>
          <tr><th rowspan="2">Job Function</th>${mainHdrs}</tr>
          <tr>${subHdrs}</tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
      ${summary}`;
  };

  // ── Read revision info ────────────────────────────────────────
  function getRevisionInfo(wb) {
    const ws = wb.Sheets['Revision'] || wb.Sheets['revision'] || wb.Sheets['REVISION'];
    if (!ws) return null;
    const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    for (let r = data.length - 1; r >= 0; r--) {
      const row = data[r] || [];
      const ver  = String(row[0] ?? '').trim();
      const rawDate = row[2];
      let date = '';
      if (typeof rawDate === 'number' && rawDate > 40000 && rawDate < 60000) {
        const d = new Date((rawDate - 25569) * 86400 * 1000);
        date = `${d.getUTCFullYear()}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${String(d.getUTCDate()).padStart(2,'0')}`;
      } else {
        date = String(rawDate ?? '').trim();
      }
      if (ver) return { ver, date };
    }
    return null;
  }

  // ── startCompare ──────────────────────────────────────────────
  function startCompare() {
    const sheetName = document.getElementById('sheetSelect').value;
    if (!sheetName || !workbooks[1] || !workbooks[2]) return;
    const btn = document.getElementById('compareBtn');
    btn.disabled = true; btn.textContent = '⏳ 比對中...';
    document.getElementById('loadingEl').classList.remove('hidden');
    document.getElementById('results').classList.add('hidden');

    setTimeout(() => {
      try {
        const isOdm   = isOdmIurSheet(sheetName);
        const isOdmRd = isOdmRdSheet(sheetName);

        // Use sheetNameMap to get actual sheet name in each file (handles case mismatch)
        const sheetLow = sheetName.trim().toLowerCase();
        const map = (window._sheetNameMap && window._sheetNameMap[sheetLow]) || {};
        const sheetName1 = map.s1 || sheetName;
        const sheetName2 = map.s2 || sheetName;

        // RD Resource 用 wide 讀取（讀取全部欄位），IUR 用一般讀取
        const isTooling = isToolingSheet(sheetName);
        const isFuncCert = isFuncCertSheet(sheetName);
        const data1 = (isOdmRd || isTooling || isFuncCert) ? getWideRawSheetRows(workbooks[1], sheetName1)
                    : (isOdm  ? getRawSheetRows(workbooks[1], sheetName1)
                               : getSheetData(workbooks[1], sheetName1));
        const data2 = (isOdmRd || isTooling || isFuncCert) ? getWideRawSheetRows(workbooks[2], sheetName2)
                    : (isOdm  ? getRawSheetRows(workbooks[2], sheetName2)
                               : getSheetData(workbooks[2], sheetName2));

        const nameA = document.getElementById('customName1')?.value?.trim() || '檔案A';
        const nameB = document.getElementById('customName2')?.value?.trim() || '檔案B';

        const revA = getRevisionInfo(workbooks[1]);
        const revB = getRevisionInfo(workbooks[2]);
        const bar = document.getElementById('revisionBar');
        if (revA || revB) {
          const fmtRev = (name, rev, cls) => rev
            ? `<div class="rev-item"><span class="rev-label ${cls}">${esc(name)}：</span>${esc(rev.ver)}${rev.date ? `（${esc(rev.date)}）` : ''}</div>`
            : `<div class="rev-item"><span class="rev-label ${cls}">${esc(name)}：</span>—</div>`;
          bar.innerHTML = fmtRev(nameA, revA, 'rev-a') + `<span style="color:#2d3748">｜</span>` + fmtRev(nameB, revB, 'rev-b');
          bar.classList.remove('hidden');
        } else {
          bar.classList.add('hidden');
        }

        document.getElementById('loadingEl').classList.add('hidden');
        if (isOdmRd) {
          renderOdmRd(data1, data2, sheetName, nameA, nameB);
        } else if (isToolingSheet(sheetName)) {
          renderTooling(data1, data2, sheetName, nameA, nameB);
        } else if (isFuncCertSheet(sheetName)) {
          renderFuncCert(data1, data2, sheetName, nameA, nameB);
        } else if (isOdm) {
          const result = compareOdmIur(data1, data2);
          renderOdmIur(result, sheetName, nameA, nameB);
        } else {
          const result = compareData(data1, data2);
          const isNre = isNreSummarySheet(sheetName);
          renderResults(result, sheetName, isNre);
          showAnalysis(result, sheetName, isNre);
        }
      } catch(err) {
        document.getElementById('loadingEl').classList.add('hidden');
        alert('比對失敗：' + err.message + '\n' + err.stack);
      }
      btn.disabled = false; btn.textContent = '🔍 開始比對';
    }, 50);
  }

  // ── renderResults ─────────────────────────────────────────────
  function renderResults(result, sheetName, isNreSummary = false) {
    const { rows, added, removed, changed, cols } = result;
    const total = added.length + removed.length + changed.length;
    const LIMIT = 500;
    const totalCols = 1 + cols.length * 4;

    const nameA = document.getElementById('customName1')?.value?.trim() || '檔案A';
    const nameB = document.getElementById('customName2')?.value?.trim() || '檔案B';
    const th1 =
      `<th class="th-item" rowspan="2">Item</th>` +
      cols.map(col => `<th colspan="4" class="th-valcol">${esc(col.label)}</th>`).join('');
    const th2 = cols.map(() =>
      `<th class="th-val-a">${esc(nameA)}</th><th class="th-val-b">${esc(nameB)}</th><th class="th-diff">差異額(A-B)</th><th class="th-pct">差異%</th>`
    ).join('');

    let adjData = null;
    let adjExclusiveNote = '';
    if (isNreSummary) {
      const totalRow = rows.find(r => /^total\b/i.test(r.key.trim()) || /^grand\s+total/i.test(r.key.trim()));
      if (totalRow) {
        const addedRows   = rows.filter(r => r.type === 'added');
        const removedRows = rows.filter(r => r.type === 'removed');
        adjData = cols.map((_, i) => {
          const adjA = totalRow.colData[i].vA.num ?? 0;
          const adjB = totalRow.colData[i].vB.num ?? 0;
          const { diff, pct } = calcDiff(adjA, adjB);
          return { adjA, adjB, diff, pct };
        });
        const aOnly = removedRows.map(r => r.key).join('、');
        const bOnly = addedRows.map(r => r.key).join('、');
        const parts = [];
        if (aOnly) parts.push(`${nameA} 獨有：${aOnly}`);
        if (bOnly) parts.push(`${nameB} 獨有：${bOnly}`);
        if (parts.length) adjExclusiveNote = '＊ ' + parts.join('　') + '\n  （上列獨有項目已含於 Total 行，最終總計直接取 Total）';
      }
    }

    const dir = d => d === null ? '' : d > 0 ? ' diff-up' : d < 0 ? ' diff-down' : ' diff-zero';

    let evenIdx = 0;
    const tbodyParts = [];
    for (const row of rows.slice(0, LIMIT)) {
      const isTotalRow = /^total\b/i.test(row.key.trim()) || /^grand\s+total/i.test(row.key.trim());
      const typeCls  = row.type === 'added' ? 'row-added' : row.type === 'removed' ? 'row-removed' : '';
      const totalCls = isTotalRow ? ' row-total' : '';
      const isChanged = row.type === 'changed';
      const itemCls  = `td-item${isChanged ? ' cell-diff' : ''}`;
      const sepRow   = isTotalRow ? `<tr class="row-sep"><td colspan="${totalCols}"></td></tr>` : '';
      const evenCls  = (evenIdx++ % 2 === 1) ? ' row-even' : '';

      const colCells = row.colData.map(col => {
        let effDiff = col.diff, effPct = col.pct;
        let aDisplay = fmtNum(col.vA.raw);
        let bDisplay = fmtNum(col.vB.raw);
        if (isNreSummary && (row.type === 'added' || row.type === 'removed')) {
          const nA = col.vA.num ?? 0;
          const nB = col.vB.num ?? 0;
          effDiff = nA - nB;
          effPct  = nB !== 0 ? (effDiff / Math.abs(nB)) * 100 : null;
          if (row.type === 'added')   aDisplay = '0';
          if (row.type === 'removed') bDisplay = '0';
        }
        const dirCls  = effDiff === null ? '' : effDiff > 0 ? ' diff-up' : effDiff < 0 ? ' diff-down' : ' diff-zero';
        const cellDiff = (isChanged && (col.hasDiff || col.textDiff)) ? ' cell-diff' : '';
        return `<td class="td-a${cellDiff}">${esc(aDisplay)}</td>` +
               `<td class="td-b${cellDiff}">${esc(bDisplay)}</td>` +
               `<td class="td-diff${dirCls}${cellDiff}">${esc(fmtDiff(effDiff))}</td>` +
               `<td class="td-pct${dirCls}${cellDiff}">${esc(fmtPct(effPct))}</td>`;
      }).join('');

      tbodyParts.push(`${sepRow}<tr class="${typeCls}${totalCls}${evenCls}" data-type="${row.type}">
        <td class="${itemCls}" title="${esc(row.key)}">${esc(row.key)}</td>
        ${colCells}
      </tr>`);
    }

    if (adjData) {
      const finalCells = adjData.map(d =>
        `<td class="td-a">${esc(fmtNumOdm(d.adjA))}</td>` +
        `<td class="td-b">${esc(fmtNumOdm(d.adjB))}</td>` +
        `<td class="td-diff${dir(d.diff)}">${esc(fmtDiff(d.diff))}</td>` +
        `<td class="td-pct${dir(d.diff)}">${esc(fmtPct(d.pct))}</td>`
      ).join('');
      const exclusiveNoteHtml = adjExclusiveNote
        ? `<tr><td colspan="${totalCols}" style="font-size:.75rem;color:#94a3b8;padding:4px 10px;font-style:italic;white-space:pre-line;background:rgba(255,255,255,.02);">${esc(adjExclusiveNote)}</td></tr>`
        : '';
      tbodyParts.push(
        `<tr class="row-sep"><td colspan="${totalCols}"></td></tr>`,
        `<tr class="row-final-total" data-type="same">
          <td class="td-item" title="Total 行直接讀（已含所有項目）">🏁 最終總計<br><span style="font-size:.72rem;font-weight:400;color:#a78bfa">= Total 行</span></td>
          ${finalCells}
        </tr>`,
        exclusiveNoteHtml
      );
    }

    let tbody = tbodyParts.join('');
    if (rows.length === 0) {
      tbody = `<tr><td colspan="${totalCols}" class="truncate-notice">（此工作表無可比對的 Item 資料）</td></tr>`;
    } else if (rows.length > LIMIT) {
      tbody += `<tr><td colspan="${totalCols}" class="truncate-notice">⚠️ 僅顯示前 ${LIMIT} 筆，共 ${rows.length} 筆</td></tr>`;
    }

    const html = `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-number">${rows.length}</div><div class="stat-label">總 Item 數</div></div>
        <div class="stat-card"><div class="stat-number" style="color:#fbbf24">${changed.length}</div><div class="stat-label">數值變動</div></div>
        <div class="stat-card"><div class="stat-number" style="color:#f87171">${removed.length}</div><div class="stat-label">${esc(nameA)} 獨有</div></div>
        <div class="stat-card"><div class="stat-number" style="color:#34d399">${added.length}</div><div class="stat-label">${esc(nameB)} 獨有</div></div>
        <div class="stat-card"><div class="stat-number" style="color:#60a5fa">${total}</div><div class="stat-label">總差異數</div></div>
      </div>
      <div class="section">
        <div class="section-title">🤖 差異摘要 <span class="badge badge-ai">自動分析</span></div>
        <div id="aiContent"></div>
      </div>
      <div class="section" style="padding:16px 20px;">
        <div class="section-title">
          📋 工作表「${esc(sheetName)}」比對結果
          <span class="badge badge-removed">紅＝${esc(nameA)}獨有</span>
          <span class="badge badge-added">綠＝${esc(nameB)}獨有</span>
          <span class="badge badge-changed">黃＝數值差異</span>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:rgba(248,113,113,.35)"></div>${esc(nameA)} 獨有 Item（整行紅色）</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(52,211,153,.35)"></div>${esc(nameB)} 獨有 Item（整行綠色）</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(251,191,36,.4)"></div>數值有差異（儲格黃色）</div>
          <div class="legend-item" style="color:#34d399">▲ 數值增加</div>
          <div class="legend-item" style="color:#f87171">▼ 數值減少</div>
        </div>
        <div class="filter-bar">
          <button class="toggle-diff-btn" id="toggleDiffBtn" onclick="toggleDiffOnly()">🔍 僅顯示差異</button>
          <span class="filter-count" id="filterCount"></span>
        </div>
        <div class="compare-wrap">
          <table class="compare-table" id="compareTable">
            <thead><tr>${th1}</tr><tr>${th2}</tr></thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      </div>`;

    const el = document.getElementById('results');
    el.innerHTML = html;
    el.classList.remove('hidden');

    requestAnimationFrame(() => {
      const thead = document.querySelector('#compareTable thead');
      if (!thead?.rows[1]) return;
      const h = thead.rows[0].getBoundingClientRect().height;
      Array.from(thead.rows[1].cells).forEach(th => th.style.top = h + 'px');
    });
  }

  // ── showAnalysis ──────────────────────────────────────────────
  function showAnalysis(result, sheetName, isNreSummary = false) {
    const { rows, added, removed, changed, cols } = result;
    const total = added.length + removed.length + changed.length;
    const nameA = document.getElementById('customName1')?.value?.trim() || '檔案A';
    const nameB = document.getElementById('customName2')?.value?.trim() || '檔案B';

    let s = `📊 工作表「${sheetName}」差異摘要\n`;
    if (total === 0) {
      s += '兩個檔案此工作表的所有 Item 完全相同，無差異。\n\n';
    } else {
      s += `共 ${total} 個 Item 有差異：數值變動 ${changed.length} 個、${nameA} 獨有 ${removed.length} 個、${nameB} 獨有 ${added.length} 個。\n\n`;
    }

    if (changed.length > 0) {
      s += `🔑 數值變動明細（前 15 筆）\n`;
      changed.slice(0, 15).forEach(item => {
        item.colData.filter(c => c.hasDiff).forEach(col => {
          const pctStr = col.pct !== null ? `${col.pct > 0 ? '+' : ''}${col.pct.toFixed(1)}%` : 'N/A';
          s += `• ${item.key} [${col.label}]：${nameA}=${fmtNum(col.vA.raw)} → ${nameB}=${fmtNum(col.vB.raw)}（差 ${fmtDiff(col.diff)}，${pctStr}）\n`;
        });
      });
      s += '\n';
    }
    if (removed.length > 0) {
      s += `⚠️ 僅 ${nameA} 有的 Item（共 ${removed.length} 個）\n`;
      removed.slice(0, 8).forEach(item => {
        const vals = item.colData.filter(c => c.vA.raw).map(c => `${c.label}: ${fmtNum(c.vA.raw)}`).join('，');
        s += `• ${item.key}${vals ? `（${vals}）` : ''}\n`;
      });
      if (removed.length > 8) s += `• … 還有 ${removed.length - 8} 個\n`;
      s += '\n';
    }
    if (added.length > 0) {
      s += `✅ 僅 ${nameB} 有的 Item（共 ${added.length} 個）\n`;
      added.slice(0, 8).forEach(item => {
        const vals = item.colData.filter(c => c.vB.raw).map(c => `${c.label}: ${fmtNum(c.vB.raw)}`).join('，');
        s += `• ${item.key}${vals ? `（${vals}）` : ''}\n`;
      });
      if (added.length > 8) s += `• … 還有 ${added.length - 8} 個\n`;
      s += '\n';
    }

    if (isNreSummary) {
      const totalRow = rows.find(r => /^total\b/i.test(r.key.trim()) || /^grand\s+total/i.test(r.key.trim()));
      if (totalRow && cols.length > 0) {
        const addedRows   = rows.filter(r => r.type === 'added');
        const removedRows = rows.filter(r => r.type === 'removed');
        s += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n🏁 最終總成本比較（含所有獨有項目）\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        cols.forEach((col, i) => {
          const adjA = (totalRow.colData[i].vA.num ?? 0) + removedRows.reduce((acc, r) => acc + (r.colData[i].vA.num ?? 0), 0);
          const adjB = (totalRow.colData[i].vB.num ?? 0) + addedRows.reduce((acc, r) => acc + (r.colData[i].vB.num ?? 0), 0);
          const diff = adjA - adjB;
          const pct  = adjB !== 0 ? (diff / Math.abs(adjB)) * 100 : null;
          if (cols.length > 1) s += `▸ ${col.label}\n`;
          s += `  ${nameA} 最終總成本：$${fmtNumOdm(adjA)}\n  ${nameB} 最終總成本：$${fmtNumOdm(adjB)}\n  總差異：${fmtDiff(diff)}（${fmtPct(pct)}）\n`;
        });
        s += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
      }
    }

    s += '💡 建議\n';
    if (total > 0) {
      if (changed.length > 0) s += '• 請核對黃色高亮欄位，確認差異原因。\n';
      if (removed.length > 0) s += `• ${nameA} 獨有的 Item 請確認是否遺漏。\n`;
      if (added.length   > 0) s += `• ${nameB} 新增的 Item 請確認報價來源正確。\n`;
    } else {
      s += '• 此工作表資料完全一致，無需修正。\n';
    }

    document.getElementById('aiContent').innerHTML = `<div class="ai-summary">${s}</div>`;
  }

  // ── toggleDiffOnly ────────────────────────────────────────────
  function toggleDiffOnly() {
    const btn = document.getElementById('toggleDiffBtn');
    const isActive = btn.classList.toggle('active');
    btn.textContent = isActive ? '✅ 僅顯示差異' : '🔍 僅顯示差異';
    const rows = document.querySelectorAll('#compareTable tbody tr[data-type]');
    let shownCount = 0;
    rows.forEach(tr => {
      const hide = isActive && tr.dataset.type === 'same';
      tr.style.display = hide ? 'none' : '';
      if (!hide) shownCount++;
    });
    const countEl = document.getElementById('filterCount');
    if (countEl) countEl.textContent = isActive ? `顯示 ${shownCount} 筆有差異` : '';
  }
</script>
