<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel 智慧比對工具</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .app {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f1117 0%, #1a1f2e 50%, #0f1117 100%);
      padding: 32px 24px;
    }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: #64748b; font-size: 0.9rem; }
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .upload-zone {
      border: 2px dashed #2d3748;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.02);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #60a5fa;
      background: rgba(96,165,250,0.05);
    }
    .upload-zone.loaded {
      border-color: #34d399;
      background: rgba(52,211,153,0.05);
    }
    .upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .upload-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .upload-name {
      font-size: 0.85rem;
      color: #34d399;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 8px;
      word-break: break-all;
    }
    .upload-hint { font-size: 0.8rem; color: #475569; margin-top: 4px; }
    .compare-btn {
      display: block;
      margin: 0 auto 32px;
      padding: 14px 48px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .compare-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(139,92,246,0.4);
    }
    .compare-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .results { max-width: 1600px; margin: 0 auto; }
    .section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-added  { background: rgba(52,211,153,0.15);  color: #34d399; }
    .badge-removed{ background: rgba(248,113,113,0.15); color: #f87171; }
    .badge-changed{ background: rgba(251,191,36,0.15);  color: #fbbf24; }
    .badge-ai     { background: rgba(139,92,246,0.15);  color: #a78bfa; }
    .ai-summary {
      line-height: 1.9;
      color: #cbd5e1;
      white-space: pre-wrap;
      font-size: 0.9rem;
    }
    .loading { text-align: center; padding: 32px; color: #64748b; }
    .loading-spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid rgba(139,92,246,0.3);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stats-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 100px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px; padding: 16px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .stat-number {
      font-size: 1.8rem; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
    .empty-state { text-align: center; padding: 16px; color: #475569; font-size: 0.85rem; }
    input[type="file"] { display: none; }
    .hidden { display: none; }

    /* ── Legend ───────────────────────────────────────────── */
    .legend {
      display: flex; gap: 20px; flex-wrap: wrap;
      margin-bottom: 14px; font-size: 0.78rem; color: #64748b;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot  { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    /* ── Side-by-side comparison table ───────────────────── */
    .compare-wrap {
      overflow: auto;
      border-radius: 8px;
      max-height: 620px;
      min-height: 60px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .compare-table {
      border-collapse: collapse;
      font-size: 0.8rem;
      white-space: nowrap;
      min-width: 100%;
    }

    /* Sticky header rows */
    .compare-table thead th {
      position: sticky;
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    /* First header row (File A / File B labels) */
    .compare-table thead tr:first-child th {
      top: 0;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.82rem;
    }
    /* Second header row (column names) */
    .compare-table thead tr:nth-child(2) th {
      /* top is set by JS after render */
      padding: 5px 12px;
      font-weight: 500;
      font-size: 0.73rem;
      color: #94a3b8;
      border-bottom: 2px solid rgba(255,255,255,0.12);
    }

    /* Row-number column */
    .th-rownum {
      background: #171c28 !important;
      color: #475569 !important;
      min-width: 52px; text-align: center;
      position: sticky !important; left: 0;
      z-index: 25 !important;
    }
    /* File A header */
    .th-a {
      background: rgba(12,32,62,0.97) !important;
      color: #60a5fa !important;
      text-align: center;
      border-left: 2px solid rgba(96,165,250,0.35);
    }
    /* File B header */
    .th-b {
      background: rgba(8,38,28,0.97) !important;
      color: #34d399 !important;
      text-align: center;
      border-left: 2px solid rgba(52,211,153,0.35);
    }
    /* Column-name sub-headers */
    .th-col-a {
      background: rgba(12,32,62,0.92) !important;
      color: #7fb3f5 !important;
      border-left: 1px solid rgba(96,165,250,0.12);
      min-width: 100px;
    }
    .th-col-b {
      background: rgba(8,38,28,0.92) !important;
      color: #5ecba1 !important;
      border-left: 1px solid rgba(52,211,153,0.12);
      min-width: 100px;
    }
    /* Divider column */
    .th-sep {
      background: rgba(255,255,255,0.04) !important;
      width: 6px; padding: 0 !important;
      border: none !important;
    }

    /* Data cells */
    .compare-table td {
      padding: 6px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      max-width: 280px;
      word-break: break-word;
      white-space: normal;
      vertical-align: top;
    }
    .td-rownum {
      color: #475569; text-align: center;
      font-size: 0.73rem;
      font-family: 'JetBrains Mono', monospace;
      position: sticky; left: 0;
      background: #171c28; z-index: 5;
      white-space: nowrap;
    }
    .td-a {
      background: rgba(12,32,62,0.18);
      border-left: 1px solid rgba(96,165,250,0.07);
    }
    .td-b {
      background: rgba(8,38,28,0.18);
      border-left: 1px solid rgba(52,211,153,0.07);
    }
    .td-sep { background: rgba(255,255,255,0.04); padding: 0; width: 6px; }

    /* Row-level highlighting */
    .row-added .td-a   { background: rgba(52,211,153,0.04) !important; color: #334155; }
    .row-added .td-b   { background: rgba(52,211,153,0.13) !important; color: #34d399; }
    .row-added .td-rownum { background: rgba(52,211,153,0.18) !important; color: #34d399; }
    .row-removed .td-a { background: rgba(248,113,113,0.13) !important; color: #f87171; }
    .row-removed .td-b { background: rgba(248,113,113,0.04) !important; color: #334155; }
    .row-removed .td-rownum { background: rgba(248,113,113,0.18) !important; color: #f87171; }

    /* Cell-level diff highlight */
    .cell-diff-a {
      background: rgba(251,191,36,0.18) !important;
      color: #fb923c !important;
      text-decoration: line-through;
    }
    .cell-diff-b {
      background: rgba(251,191,36,0.28) !important;
      color: #fbbf24 !important;
      font-weight: 700;
    }

    /* Truncation notice */
    .truncate-notice {
      text-align: center; padding: 14px;
      color: #64748b; font-size: 0.8rem;
      background: rgba(255,255,255,0.02);
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📊 Excel 智慧比對工具</h1>
    <p>上傳兩個 Excel 檔案，自動分析並整理差異重點</p>
  </div>

  <div class="upload-grid">
    <label class="upload-zone" id="zone1"
      ondragover="handleDragOver(event,1)"
      ondragleave="handleDragLeave(1)"
      ondrop="handleDrop(event,1)">
      <input type="file" id="file1" accept=".xlsx,.xls" onchange="handleFileChange(1)">
      <div class="upload-icon" id="icon1">📄</div>
      <div class="upload-label">檔案 A</div>
      <div class="upload-name hidden" id="name1"></div>
      <div class="upload-hint" id="hint1">點擊或拖曳 Excel 檔案到此處</div>
    </label>

    <label class="upload-zone" id="zone2"
      ondragover="handleDragOver(event,2)"
      ondragleave="handleDragLeave(2)"
      ondrop="handleDrop(event,2)">
      <input type="file" id="file2" accept=".xlsx,.xls" onchange="handleFileChange(2)">
      <div class="upload-icon" id="icon2">📄</div>
      <div class="upload-label">檔案 B</div>
      <div class="upload-name hidden" id="name2"></div>
      <div class="upload-hint" id="hint2">點擊或拖曳 Excel 檔案到此處</div>
    </label>
  </div>

  <button class="compare-btn" id="compareBtn" onclick="startCompare()" disabled>🔍 開始比對</button>

  <div id="loadingEl" class="loading hidden">
    <div class="loading-spinner"></div>
    <div>正在比對資料...</div>
  </div>

  <div id="results" class="results hidden"></div>
</div>

<script>
  let files = { 1: null, 2: null };

  function handleDragOver(e, n) {
    e.preventDefault();
    document.getElementById('zone' + n).classList.add('drag-over');
  }
  function handleDragLeave(n) {
    document.getElementById('zone' + n).classList.remove('drag-over');
  }
  function handleDrop(e, n) {
    e.preventDefault();
    document.getElementById('zone' + n).classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && (f.name.endsWith('.xlsx') || f.name.endsWith('.xls'))) setFile(n, f);
  }
  function handleFileChange(n) {
    const input = document.getElementById('file' + n);
    if (input.files[0]) setFile(n, input.files[0]);
  }
  function setFile(n, f) {
    files[n] = f;
    document.getElementById('zone' + n).classList.add('loaded');
    document.getElementById('icon' + n).textContent = '✅';
    document.getElementById('name' + n).textContent = f.name;
    document.getElementById('name' + n).classList.remove('hidden');
    document.getElementById('hint' + n).classList.add('hidden');
    document.getElementById('compareBtn').disabled = !(files[1] && files[2]);
  }

  function parseExcel(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          resolve(XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' }));
        } catch(err) { reject(err); }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });
  }

  // Key-based comparison using the first column as a unique identifier.
  // Row 0 is the header row; data rows start from index 1.
  // Returns { rows, added, removed, changed, maxCols, headers }
  // rows[i] = { type, key, rowNumA, rowNumB, data1, data2, changedCols:Set }
  function compareData(data1, data2) {
    const headers1 = data1[0] || [];
    const headers2 = data2[0] || [];
    const maxCols = Math.max(
      headers1.length, headers2.length,
      ...data1.slice(1).map(r => r.length),
      ...data2.slice(1).map(r => r.length),
      1
    );
    const headers = headers1.length >= headers2.length ? headers1 : headers2;

    // Build key → { rowData, rowNum } maps (key = first column value)
    const map1 = new Map();
    for (let r = 1; r < data1.length; r++) {
      const row = data1[r] || [];
      const key = String(row[0] ?? '');
      if (!map1.has(key)) map1.set(key, { rowData: row, rowNum: r + 1 });
    }
    const map2 = new Map();
    for (let r = 1; r < data2.length; r++) {
      const row = data2[r] || [];
      const key = String(row[0] ?? '');
      if (!map2.has(key)) map2.set(key, { rowData: row, rowNum: r + 1 });
    }

    // Merge key order: A keys first, then B-only keys
    const allKeys = [...map1.keys()];
    for (const key of map2.keys()) {
      if (!map1.has(key)) allKeys.push(key);
    }

    const rows = [], added = [], removed = [], changed = [];

    for (const key of allKeys) {
      const e1 = map1.get(key);
      const e2 = map2.get(key);

      if (!e1) {
        // Only in B (added)
        rows.push({ type: 'added', key, rowNumA: null, rowNumB: e2.rowNum,
                    data1: null, data2: e2.rowData, changedCols: new Set() });
        added.push({ key, row: e2.rowNum, data: e2.rowData });
      } else if (!e2) {
        // Only in A (removed)
        rows.push({ type: 'removed', key, rowNumA: e1.rowNum, rowNumB: null,
                    data1: e1.rowData, data2: null, changedCols: new Set() });
        removed.push({ key, row: e1.rowNum, data: e1.rowData });
      } else {
        // In both — compare column by column
        const changedCols = new Set();
        const changes = [];
        for (let c = 0; c < maxCols; c++) {
          const v1 = String(e1.rowData[c] ?? '');
          const v2 = String(e2.rowData[c] ?? '');
          if (v1 !== v2) { changedCols.add(c); changes.push({ col: c + 1, old: v1, new: v2 }); }
        }
        if (changedCols.size > 0) {
          rows.push({ type: 'changed', key, rowNumA: e1.rowNum, rowNumB: e2.rowNum,
                      data1: e1.rowData, data2: e2.rowData, changedCols });
          changed.push({ key, row: e1.rowNum, changes });
        } else {
          rows.push({ type: 'same', key, rowNumA: e1.rowNum, rowNumB: e2.rowNum,
                      data1: e1.rowData, data2: e2.rowData, changedCols: new Set() });
        }
      }
    }

    return { rows, added, removed, changed, maxCols, headers };
  }

  // Escape HTML special chars
  function esc(v) {
    return String(v ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function showLocalAnalysis(result) {
    const { added, removed, changed, headers } = result;
    const total = added.length + removed.length + changed.length;

    const colName = idx => {
      const h = headers[idx];
      return h ? `「${h}」` : `欄位 ${idx + 1}`;
    };

    let s = '';

    // 1. 整體差異摘要
    s += '📊 整體差異摘要\n';
    if (total === 0) {
      s += '兩個檔案內容完全相同，無任何差異。\n\n';
    } else {
      s += `共發現 ${total} 個差異項目：B 獨有 ${added.length} 筆、A 獨有 ${removed.length} 筆、內容修改 ${changed.length} 筆。\n`;
      s += `（比對依據：第一欄 ${colName(0)} 作為唯一識別鍵）\n\n`;
    }

    // 2. 主要差異重點（含具體欄位值）
    s += '🔑 主要差異重點\n';
    if (changed.length > 0) {
      changed.slice(0, 10).forEach(row => {
        const keyLabel = esc(row.key);
        const diffs = row.changes.map(c => {
          const name = colName(c.col - 1);
          const numA = parseFloat(c.old), numB = parseFloat(c.new);
          const isNum = !isNaN(numA) && !isNaN(numB) && c.old !== '' && c.new !== '';
          const note = isNum
            ? `（差異 ${numB - numA > 0 ? '+' : ''}${(numB - numA).toLocaleString()}）`
            : '';
          return `${name}：A=${c.old || '(空白)'} vs B=${c.new || '(空白)'}${note}`;
        }).join('\n    ');
        s += `• [${keyLabel}]\n    ${diffs}\n`;
      });
      if (changed.length > 10) s += `• … 還有 ${changed.length - 10} 筆修改未列出\n`;
    }
    if (added.length   > 0) s += `• 檔案 B 獨有 ${added.length} 筆（表格綠色列）\n`;
    if (removed.length > 0) s += `• 檔案 A 獨有 ${removed.length} 筆（表格紅色列）\n`;
    if (total === 0) s += '• 所有識別鍵與欄位均一致\n';
    s += '\n';

    // 3. A 獨有的項目
    if (removed.length > 0) {
      s += '⚠️ 檔案 A 獨有（B 中不存在）\n';
      removed.slice(0, 6).forEach(row => {
        const preview = (row.data || []).slice(0, 5).filter(v => String(v) !== '').join(' | ');
        s += `• [${esc(row.key)}]　${preview}\n`;
      });
      if (removed.length > 6) s += `• … 還有 ${removed.length - 6} 筆\n`;
      s += '\n';
    }

    // 4. B 獨有的項目
    if (added.length > 0) {
      s += '✅ 檔案 B 獨有（A 中不存在）\n';
      added.slice(0, 6).forEach(row => {
        const preview = (row.data || []).slice(0, 5).filter(v => String(v) !== '').join(' | ');
        s += `• [${esc(row.key)}]　${preview}\n`;
      });
      if (added.length > 6) s += `• … 還有 ${added.length - 6} 筆\n`;
      s += '\n';
    }

    // 5. 建議
    s += '💡 建議\n';
    if (total > 0) {
      if (removed.length > 0) s += '• 請確認 A 獨有的資料是否為刻意刪除，避免遺失。\n';
      if (added.length   > 0) s += '• 請確認 B 新增的資料來源是否正確。\n';
      if (changed.length > 0) s += '• 請逐一核對黃色高亮儲格，確認修改符合預期。\n';
    } else {
      s += '• 兩份檔案完全一致，可以放心使用。\n';
    }

    document.getElementById('aiContent').innerHTML = `<div class="ai-summary">${s}</div>`;
  }

  async function startCompare() {
    const btn = document.getElementById('compareBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 比對中...';
    document.getElementById('loadingEl').classList.remove('hidden');
    document.getElementById('results').classList.add('hidden');

    try {
      const [data1, data2] = await Promise.all([parseExcel(files[1]), parseExcel(files[2])]);
      const result = compareData(data1, data2);

      document.getElementById('loadingEl').classList.add('hidden');
      renderResults(result);
      showLocalAnalysis(result);
    } catch(err) {
      document.getElementById('loadingEl').classList.add('hidden');
      alert('讀取檔案失敗，請確認是有效的 Excel 檔案');
    }

    btn.disabled = false;
    btn.textContent = '🔍 開始比對';
  }

  function renderResults(result) {
    const { rows, added, removed, changed, maxCols, headers } = result;
    const total = added.length + removed.length + changed.length;
    const LIMIT = 300;
    const displayRows = rows.slice(0, LIMIT);
    const truncated = rows.length > LIMIT;

    // Column header labels (same for both sides — same schema)
    const hA = Array.from({ length: maxCols }, (_, i) => esc(headers[i] ?? `欄 ${i + 1}`));
    const hB = Array.from({ length: maxCols }, (_, i) => esc(headers[i] ?? `欄 ${i + 1}`));

    // ── thead row 1: File A / File B labels ─────────────────
    const thRow1 =
      `<th class="th-rownum" rowspan="2">行</th>` +
      `<th colspan="${maxCols}" class="th-a">📁 檔案 A</th>` +
      `<th class="th-sep" rowspan="2"></th>` +
      `<th colspan="${maxCols}" class="th-b">📁 檔案 B</th>`;

    // ── thead row 2: column names ────────────────────────────
    const thRow2 =
      hA.map(h => `<th class="th-col-a">${h}</th>`).join('') +
      `<th class="th-sep"></th>` +
      hB.map(h => `<th class="th-col-b">${h}</th>`).join('');

    // ── tbody ────────────────────────────────────────────────
    let tbody = displayRows.map(row => {
      const typeClass = row.type === 'added' ? 'row-added'
                      : row.type === 'removed' ? 'row-removed'
                      : '';
      const rowLabel = row.rowNumA ?? row.rowNumB;
      let tds = `<td class="td-rownum">${rowLabel}</td>`;

      // A side
      for (let c = 0; c < maxCols; c++) {
        const val = row.data1 != null ? esc(row.data1[c] ?? '') : '';
        const cls = 'td-a' + (row.changedCols.has(c) ? ' cell-diff-a' : '');
        tds += `<td class="${cls}">${val}</td>`;
      }
      tds += `<td class="td-sep"></td>`;
      // B side
      for (let c = 0; c < maxCols; c++) {
        const val = row.data2 != null ? esc(row.data2[c] ?? '') : '';
        const cls = 'td-b' + (row.changedCols.has(c) ? ' cell-diff-b' : '');
        tds += `<td class="${cls}">${val}</td>`;
      }

      return `<tr class="${typeClass}">${tds}</tr>`;
    }).join('');

    if (rows.length === 0) {
      tbody = `<tr><td colspan="${maxCols * 2 + 2}" class="truncate-notice">（兩個檔案均無資料列）</td></tr>`;
    } else if (truncated) {
      tbody += `<tr><td colspan="${maxCols * 2 + 2}" class="truncate-notice">
        ⚠️ 僅顯示前 ${LIMIT} 行，共 ${rows.length} 行資料
      </td></tr>`;
    }

    // ── Assemble HTML ────────────────────────────────────────
    const html = `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-number" style="color:#34d399">${added.length}</div><div class="stat-label">新增行</div></div>
        <div class="stat-card"><div class="stat-number" style="color:#f87171">${removed.length}</div><div class="stat-label">刪除行</div></div>
        <div class="stat-card"><div class="stat-number" style="color:#fbbf24">${changed.length}</div><div class="stat-label">修改行</div></div>
        <div class="stat-card"><div class="stat-number" style="color:#60a5fa">${total}</div><div class="stat-label">總差異</div></div>
      </div>

      <div class="section">
        <div class="section-title">🤖 智慧分析 <span class="badge badge-ai">本地分析</span></div>
        <div id="aiContent"><div class="loading"><div class="loading-spinner"></div><div>分析中...</div></div></div>
      </div>

      <div class="section" style="padding: 20px 24px;">
        <div class="section-title">
          📋 左右並排比對表
          <span class="badge badge-added">綠 ＝ B 新增</span>
          <span class="badge badge-removed">紅 ＝ A 獨有</span>
          <span class="badge badge-changed">黃 ＝ 儲格修改</span>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:rgba(52,211,153,0.3)"></div>B 新增行（整行綠色）</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(248,113,113,0.3)"></div>A 獨有行（整行紅色）</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(251,191,36,0.35)"></div>修改的儲格（舊值刪除線 → 新值加粗）</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.06)"></div>無差異（正常顯示）</div>
        </div>
        <div class="compare-wrap">
          <table class="compare-table" id="compareTable">
            <thead>
              <tr>${thRow1}</tr>
              <tr>${thRow2}</tr>
            </thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
        ${total === 0 ? '<div class="empty-state" style="margin-top:16px">✅ 兩個檔案內容完全相同，沒有差異！</div>' : ''}
      </div>
    `;

    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = html;
    resultsEl.classList.remove('hidden');

    // Fix sticky position of second thead row after render
    requestAnimationFrame(() => {
      const thead = document.querySelector('#compareTable thead');
      if (!thead) return;
      const row1Height = thead.rows[0] ? thead.rows[0].getBoundingClientRect().height : 40;
      Array.from(thead.rows[1]?.cells || []).forEach(th => {
        th.style.top = row1Height + 'px';
      });
    });
  }
</script>
</body>
</html>
